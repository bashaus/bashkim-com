name: lighthouse

on:
  workflow_call:
    inputs:
      base-url:
        type: string
        default: https://www.bashkim.com
        description: The base URL to test via lighthouse ci
        required: false
    secrets:
      VERCEL_AUTOMATION_BYPASS_SECRET:
        description: Secret for accessing vercel environments
        required: false

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: node install
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: lhci install
        run: npm install -g @lhci/cli

      # - name: lhci autorun mobile
      #   run: >
      #     lhci autorun
      #       --collect.url="$LHCI_COLLECT_URL"
      #   env:
      #     LHCI_COLLECT_URL: ${{ inputs.base-url }}
      #     VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: lhci autorun desktop
        run: >
          lhci autorun \
            --collect.settings.preset="desktop" \
            --collect.url="${LHCI_COLLECT_URL}"
        env:
          LHCI_COLLECT_URL: ${{ inputs.base-url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: lhci artifact
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: ./lhci-results
